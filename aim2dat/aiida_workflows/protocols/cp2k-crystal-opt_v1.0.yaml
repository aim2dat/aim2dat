%YAML 1.2
---
title: cp2k-crystal-opt
version: '1.0'
description: >
  Cell-optimization-only pipeline for crystalline semiconductors/insulators:
  (1) find_scf_parameters — SCF convergence search with DZVP basis;
  (2) unit_cell_preopt    — fast pre-relaxation with DZVP, loose thresholds;
  (3) unit_cell_opt       — production cell optimization with TZV2P, tight thresholds.
  Optimizes the structure exactly as given by parent_node (the conventional
  cell, e.g. straight from a CIF) -- no SeekPath/primitive-cell reduction
  here. Split out from cp2k-crystal-phonons_v1.0 on 2026-07-06: running
  KEEP_SPACE_GROUP cell-opt directly on a SeekPath primitive cell
  (non-orthogonal, e.g. 60-degree rhombohedral angles for an fcc-derived
  lattice) made spglib's own re-detection fragile after small numerical
  drift introduced by KEEP_SPACE_GROUP's BFGS projection -- both Si and NaCl
  were misclassified as space group 2 (P-1) at the unit_cell_opt stage,
  leaving all 6 cell DOF free and the pressure criterion unable to converge
  (see the cp2k-crystal-phonons-v1.0 wiki gotcha for the full trace).
  Optimizing the conventional (already orthogonal/cubic) cell is far more
  forgiving for this same re-detection step -- this is what the original,
  validated v1 Si/NaCl pipeline did. Feed this protocol's optimized_structure
  result into cp2k-phonons_v1.0 (parent_node) for the phonon stage, which
  does its own SeekPath reduction once, after optimization.
dependencies:
- [aiida-core, '1.6', Null]
- [seekpath, '2.0', Null]
parent_node_type: structure
parent_node_input:
  find_scf_parameters: structural_p.structure
  unit_cell_preopt: structural_p.structure
tasks:
  find_scf_parameters:
    process: aim2dat.cp2k.find_scf_p
    blacklist_inputs:
    - custom_scf_method
  unit_cell_preopt:
    process: aim2dat.cp2k.cell_opt
    blacklist_inputs:
    - custom_scf_method
    - optimization_p.keep_angles
    - optimization_p.keep_symmetry
    dependencies:
      find_scf_parameters:
      - [scf_parameters, structural_p.scf_parameters]
  unit_cell_opt:
    process: aim2dat.cp2k.cell_opt
    blacklist_inputs:
    - custom_scf_method
    - optimization_p.keep_angles
    - optimization_p.keep_symmetry
    dependencies:
      unit_cell_preopt:
      - [cp2k.output_structure, structural_p.structure]
      - [scf_parameters, structural_p.scf_parameters]

general_input:
  # ── CP2K parameters shared by all cell-opt tasks ──────────────────────────
  cp2k.parameters:
    value:
      GLOBAL:
        PRINT_LEVEL: MEDIUM
        PREFERRED_DIAG_LIBRARY: SCALAPACK
        EXTENDED_FFT_LENGTHS: true
      FORCE_EVAL:
        METHOD: Quickstep
        STRESS_TENSOR: ANALYTICAL
        DFT:
          MGRID: {}
          POISSON: {PERIODIC: XYZ, POISSON_SOLVER: PERIODIC}
          BASIS_SET_FILE_NAME: [BASIS_MOLOPT_UZH, BASIS_MOLOPT, BASIS_MOLOPT_UCL]
          POTENTIAL_FILE_NAME: GTH_POTENTIALS
          QS: {EXTRAPOLATION: USE_GUESS, EPS_DEFAULT: 1.0e-14}
          SCF: {EPS_SCF: 5.0e-7}
          KPOINTS:
            EPS_GEO: 1.0e-8
            FULL_GRID: false
            SYMMETRY: false
          XC: {}
        SUBSYS:
          CELL: {PERIODIC: XYZ}
    aiida_node: true
    tasks: [find_scf_parameters, unit_cell_preopt, unit_cell_opt]

  # ── k-point density (Å⁻¹) ─────────────────────────────────────────────────
  numerical_p.kpoints_ref_dist:
    value: 0.15
    aiida_node: true
    tasks: [find_scf_parameters, unit_cell_opt]
  numerical_p.kpoints_ref_dist->unit_cell_preopt:
    value: 0.25
    aiida_node: true
    compare: false

  # ── SCF solver settings ───────────────────────────────────────────────────
  scf_method:
    value: density_mixing
    aiida_node: true
    tasks: [find_scf_parameters, unit_cell_preopt, unit_cell_opt]

  factor_unocc_states:
    value: 0.75
    aiida_node: true
    tasks: [find_scf_parameters, unit_cell_preopt, unit_cell_opt]

  enable_roks:
    value: false
    aiida_node: true
    tasks: [find_scf_parameters, unit_cell_preopt, unit_cell_opt]

  always_add_unocc_states:
    value: true
    aiida_node: true
    tasks: [find_scf_parameters, unit_cell_preopt, unit_cell_opt]

  adjust_scf_parameters:
    value: true
    aiida_node: true
    tasks: [unit_cell_preopt, unit_cell_opt]

  max_iterations:
    value: 100
    aiida_node: true
    compare: false
    tasks: [find_scf_parameters, unit_cell_preopt, unit_cell_opt]

  # ── Geometry optimisation thresholds ──────────────────────────────────────
  optimization_p.keep_space_group:
    value: true
    aiida_node: true
    tasks: [unit_cell_preopt, unit_cell_opt]
  optimization_p.eps_symmetry:
    value: 0.005
    aiida_node: true
    tasks: [unit_cell_preopt, unit_cell_opt]
  optimization_p.ref_cell_scaling_factor:
    value: 1.5
    aiida_node: true
    tasks: [unit_cell_preopt, unit_cell_opt]

  # Preopt — loose pressure threshold for speed
  optimization_p.pressure_tolerance->unit_cell_preopt:
    value: 200.0
    aiida_node: true
    compare: false

  # Final opt — tight pressure threshold so cell volume is well-converged for phonons
  optimization_p.pressure_tolerance->unit_cell_opt:
    value: 100.0
    aiida_node: true

user_input:
  # ── Extended-system flag (false for semiconductors / insulators) ──────────
  scf_extended_system:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: true
    tasks: [find_scf_parameters, unit_cell_preopt, unit_cell_opt]

  # ── XC functional ─────────────────────────────────────────────────────────
  numerical_p.xc_functional:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: true
    tasks: [find_scf_parameters, unit_cell_preopt, unit_cell_opt]

  # ── Basis sets — DZVP for find_scf / preopt, TZV2P for opt ────────────────
  numerical_p.basis_sets:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: true
    tasks: [find_scf_parameters, unit_cell_opt]
  numerical_p.basis_sets->unit_cell_preopt:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: false

  # ── Grid cutoffs — lower for find_scf/preopt, higher for opt ──────────────
  numerical_p.cutoff_values:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: true
    tasks: [find_scf_parameters]
  numerical_p.cutoff_values->unit_cell_preopt:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: false
  numerical_p.cutoff_values->unit_cell_opt:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: false

  # ── Compute code & scheduler metadata ─────────────────────────────────────
  cp2k.code:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: false
    tasks: [find_scf_parameters, unit_cell_preopt, unit_cell_opt]
  cp2k.metadata:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: false
    unstored: true
    optional: true
    compare: false
    tasks: [find_scf_parameters, unit_cell_preopt, unit_cell_opt]

  # ── Geometry optimisation force thresholds (user-overridable with defaults) ─
  # Preopt uses a loose threshold for speed; opt uses 1.9e-5 Ha/Bohr so that
  # residual forces in the relaxed cell are small enough for accurate phonons.
  optimization_p.max_force->unit_cell_preopt:
    validation: aim2dat.cp2k.cell_opt
    aiida_node: true
    optional: true
    compare: false
    value: 0.005
  optimization_p.max_force->unit_cell_opt:
    validation: aim2dat.cp2k.cell_opt
    aiida_node: true
    optional: true
    compare: false
    value: 1.9e-5

  # ── Structure override for unit_cell_opt (rarely needed) ──────────────────
  # structural_p.structure is normally wired automatically from
  # unit_cell_preopt.cp2k.output_structure. Kept available for the rare case
  # a notebook needs to hand-correct unit_cell_opt's input directly.
  structural_p.structure->unit_cell_opt:
    validation: aim2dat.cp2k.cell_opt
    aiida_node: true
    optional: true
    compare: false

  # ── Optional: clean scratch directories after each step ───────────────────
  clean_workdir:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    optional: true
    compare: false
    tasks: [find_scf_parameters, unit_cell_preopt, unit_cell_opt]

results:
  scf_method_level:
    task: find_scf_parameters
    output_port: scf_parameters
    retrieve_value: [method_level]
  scf_parameter_level:
    task: find_scf_parameters
    output_port: scf_parameters
    retrieve_value: [parameter_level]
  scf_smearing_level:
    task: find_scf_parameters
    output_port: scf_parameters
    retrieve_value: [smearing_level]
  optimized_structure:
    task: unit_cell_opt
    output_port: cp2k.output_structure
  total_energy:
    task: unit_cell_opt
    output_port: cp2k.output_parameters
    retrieve_value: [energy]
    unit: Hartree
  space_group:
    task: unit_cell_opt
    output_port: cp2k.output_parameters
    retrieve_value: [spgr_info, sg_number]
