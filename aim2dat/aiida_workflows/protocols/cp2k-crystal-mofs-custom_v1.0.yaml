%YAML 1.2
---
# Custom MOF protocol extending v3.0 with:
#   - No default wavefunction hand-off from unit_cell_preopt to unit_cell_opt.
#     unit_cell_preopt runs on a cheaper basis (DZVP / standard GTH) than
#     unit_cell_opt (TZV2P / SR-GTH) by design, so the two stages don't have
#     the same number of basis functions — auto-inheriting preopt's
#     cp2k.remote_folder into opt's cp2k.parent_calc_folder made CP2K abort
#     with "READ RESTART: Different number of basis functions"
#     (kpoint_io.F:399) on every structure that lacked a separately-supplied,
#     basis-matched restart folder. Removed; unit_cell_opt now starts from an
#     atomic guess unless you explicitly pass a basis-matched restart.
#   - cp2k.parent_calc_folder->unit_cell_preopt  optional restart for preopt.
#   - cp2k.parent_calc_folder->unit_cell_opt     optional restart for opt —
#     must come from a run using the same basis set as unit_cell_opt
#     (basis_production), e.g. a previous unit_cell_opt/production-tier run.
#
# Basis set / cutoff design:
#   General numerical_p.basis_sets / numerical_p.cutoff_values apply to
#   find_scf + unit_cell_opt + all postprocessing tasks (keeping opt and
#   postprocessing on the same basis — physically consistent).
#   unit_cell_preopt uses its own ->unit_cell_preopt overrides (DZVP / coarser grid).
#
# Per-atom dict basis sets are supported for both general and preopt entries:
#   {"H": ["TZV2P-MOLOPT-PBE-GTH-q1", "GTH-PBE-q1"],
#    "Zn": ["TZV2P-MOLOPT-SR-GTH-q12", "GTH-PBE-q12"], ...}
title: cp2k-crystal-mofs-custom
version: '1.0'
description: >
  Settings to calculate metal-organic frameworks. Supports per-atom dict basis
  sets with a dedicated preopt override and optional, explicit restart folder
  overrides for both cell-opt tasks (no implicit wavefunction hand-off between
  them, since they run on different basis sets by default).
dependencies:
- [aiida-core, '2.7', Null]
parent_node_type: core.structure
parent_node_input:
  find_scf_parameters: structural_p.structure
  unit_cell_preopt: structural_p.structure
tasks:
  find_scf_parameters:
    process: aim2dat.cp2k.find_scf_p
    blacklist_inputs:
    - custom_scf_method
  unit_cell_preopt:
    process: aim2dat.cp2k.cell_opt
    dependencies:
      find_scf_parameters:
      - [scf_parameters, structural_p.scf_parameters]
    blacklist_inputs:
    - custom_scf_method
    - optimization_p.keep_space_group
    - optimization_p.keep_symmetry
  unit_cell_opt:
    process: aim2dat.cp2k.cell_opt
    dependencies:
      unit_cell_preopt:
      - [cp2k.output_structure, structural_p.structure]
      - [scf_parameters, structural_p.scf_parameters]
    blacklist_inputs:
    - custom_scf_method
    - optimization_p.keep_space_group
    - optimization_p.keep_symmetry
  band_structure:
    process: aim2dat.cp2k.band_structure
    dependencies:
      unit_cell_opt:
      - [cp2k.output_structure, structural_p.structure]
      - [cp2k.remote_folder, cp2k.parent_calc_folder]
      - [scf_parameters, structural_p.scf_parameters]
    blacklist_inputs:
    - custom_scf_method
  eigenvalues:
    process: aim2dat.cp2k.eigenvalues
    dependencies:
      unit_cell_opt:
      - [cp2k.output_structure, structural_p.structure]
      - [cp2k.remote_folder, cp2k.parent_calc_folder]
      - [scf_parameters, structural_p.scf_parameters]
    blacklist_inputs:
    - custom_scf_method
  pdos:
    process: aim2dat.cp2k.pdos
    dependencies:
      unit_cell_opt:
      - [cp2k.output_structure, structural_p.structure]
      - [scf_parameters, structural_p.scf_parameters]
    blacklist_inputs:
    - custom_scf_method
  partial_charges:
    process: aim2dat.cp2k.partial_charges
    dependencies:
      unit_cell_opt:
      - [cp2k.output_structure, structural_p.structure]
      - [cp2k.remote_folder, cp2k.parent_calc_folder]
      - [scf_parameters, structural_p.scf_parameters]
    blacklist_inputs:
    - custom_scf_method
general_input:
  cp2k.parameters:
    value:
      GLOBAL:
        PRINT_LEVEL: MEDIUM
        PREFERRED_DIAG_LIBRARY: SCALAPACK
        EXTENDED_FFT_LENGTHS: true
      FORCE_EVAL:
        METHOD: Quickstep
        STRESS_TENSOR: ANALYTICAL
        DFT:
          MGRID: {}
          POISSON: {PERIODIC: XYZ, POISSON_SOLVER: PERIODIC}
          BASIS_SET_FILE_NAME: [BASIS_MOLOPT_UZH, BASIS_MOLOPT_UCL, BASIS_MOLOPT]
          POTENTIAL_FILE_NAME: GTH_POTENTIALS
          QS: {EXTRAPOLATION: USE_GUESS, EPS_DEFAULT: 1e-14}
          SCF: {EPS_SCF: 5.0e-7}
          KPOINTS:
            EPS_GEO: 1.0E-8
          XC: {}
        SUBSYS:
          CELL: {PERIODIC: XYZ}
    aiida_node: true
    tasks: [find_scf_parameters, unit_cell_preopt, unit_cell_opt, band_structure, eigenvalues, pdos, partial_charges]
  numerical_p.kpoints_ref_dist:
    value: 0.20
    aiida_node: true
    tasks: [find_scf_parameters, unit_cell_opt, band_structure, partial_charges]
  factor_unocc_states:
    value: 0.75
    aiida_node: true
    tasks: [find_scf_parameters, unit_cell_preopt, unit_cell_opt, band_structure, eigenvalues, pdos, partial_charges]
  enable_roks:
    value: false
    aiida_node: true
    tasks: [find_scf_parameters, unit_cell_preopt, unit_cell_opt, band_structure, eigenvalues, pdos, partial_charges]
  scf_method:
    value: density_mixing
    aiida_node: true
    tasks: [find_scf_parameters, unit_cell_preopt, unit_cell_opt, band_structure, eigenvalues, pdos, partial_charges]
  adjust_scf_parameters:
    value: true
    aiida_node: true
    tasks: [unit_cell_preopt, unit_cell_opt, band_structure, eigenvalues, pdos, partial_charges]
  always_add_unocc_states:
    value: true
    aiida_node: true
    tasks: [find_scf_parameters, unit_cell_preopt, unit_cell_opt, partial_charges]
  max_iterations:
    value: 100
    aiida_node: true
    compare: False
    tasks: [find_scf_parameters, unit_cell_preopt, unit_cell_opt, band_structure, eigenvalues, pdos, partial_charges]
  optimization_p.keep_angles:
    value: true
    aiida_node: true
    tasks: [unit_cell_preopt, unit_cell_opt]
  numerical_p.kpoints_ref_dist->unit_cell_preopt:
    value: 0.40
    aiida_node: true
    compare: false
  optimization_p.max_force->unit_cell_preopt:
    value: 0.005
    aiida_node: true
    compare: false
  # 2026-07-06: raised 200 -> 2000 bar. DZVP cheap tier carries a ~-1 kbar
  # Pulay-stress offset (UiO-66 preopt plateaued at -950 bar for ~600 steps
  # with forces 100x converged) -- the preopt is a rough relaxation, let
  # max_force govern.
  optimization_p.pressure_tolerance->unit_cell_preopt:
    value: 2000.0
    aiida_node: true
    compare: false
  # 2026-07-06: tightened 4.5e-4 -> 1.9e-5 Ha/Bohr (same value as
  # cp2k-crystal-phonons_v1.0) so the relaxed cell is clean enough for the
  # downstream phonon branch.
  optimization_p.max_force->unit_cell_opt:
    value: 1.9e-05
    aiida_node: true
  # 2026-07-06: raised 100 -> 500 bar; TZV2P shrinks but does not remove the
  # Pulay-stress offset, 100 bar is likely unreachable.
  optimization_p.pressure_tolerance->unit_cell_opt:
    value: 500.0
    aiida_node: true
  numerical_p.kpoints_ref_dist->eigenvalues:
    value: 0.1
    aiida_node: true
  minimum_cell_length->pdos:
    value: 25.0
    aiida_node: true
  maximum_cell_length->pdos:
    value: 40.0
    aiida_node: true
  resolve_atoms->pdos:
    value: true
    aiida_node: true
  critic2.parameters->partial_charges:
    value:
    - crystal aiida-ELECTRON_DENSITY-1_0.cube
    - load aiida-ELECTRON_DENSITY-1_0.cube core zpsp
    - load aiida-ELECTRON_DENSITY-1_0.cube
    - integrable 2
    - yt
    dependency: critic2.code
    aiida_node: true
  chargemol.parameters->partial_charges:
    value: {'periodicity along A, B, and C vectors': [true, true, true], charge type: DDEC6}
    dependency: chargemol.code
    aiida_node: true
user_input:
  path_parameters:
    validation: aim2dat.cp2k.band_structure
    aiida_node: true
    optional: true
    compare: true
    tasks: [band_structure]
  scf_extended_system:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: true
    tasks: [find_scf_parameters, unit_cell_preopt, unit_cell_opt, band_structure, eigenvalues, pdos, partial_charges]
  # FindSCFParametersWorkChain.setup_wc_specific_inputs only turns smearing on
  # when this is explicitly "metallic" (or inferred from an all-metal kind
  # list / a stored band_gap attribute — neither applies to mixed-element MOF
  # structures). scf_extended_system alone does NOT enable smearing, it only
  # affects ADDED_MOS. Without it, open-shell 3d-metal paddle-wheel MOFs
  # (near-degenerate d-states at the Fermi level) can SCF-stall under pure
  # Broyden mixing — oscillating just above EPS_SCF instead of converging.
  # Set to "metallic" or "insulator" per structure; only consumed by
  # find_scf_parameters.
  structural_p.system_character:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    optional: true
    compare: true
    tasks: [find_scf_parameters]
  numerical_p.xc_functional:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: true
    tasks: [find_scf_parameters, unit_cell_preopt, unit_cell_opt, band_structure, eigenvalues, pdos, partial_charges]
  # ── Cutoff values ─────────────────────────────────────────────────────────
  # General value applies to find_scf, unit_cell_opt, band_structure, eigenvalues,
  # pdos, and partial_charges.  Use the task-specific overrides below to set
  # a coarser/finer grid per step without touching the others.
  # ── Cutoff values ─────────────────────────────────────────────────────────
  # General value applies to unit_cell_opt and all postprocessing tasks.
  # find_scf_parameters uses its own ->find_scf_parameters override (coarser
  # grid keeps the parameter search fast).
  numerical_p.cutoff_values:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: true
    tasks: [unit_cell_opt, band_structure, eigenvalues, pdos, partial_charges]
  # Coarser grid for the SCF parameter search — fast is all that matters here.
  numerical_p.cutoff_values->find_scf_parameters:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    optional: false
    compare: false
  # Coarser grid for preopt (speed over accuracy).
  numerical_p.cutoff_values->unit_cell_preopt:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: false
  # ── Basis sets ────────────────────────────────────────────────────────────
  # Accepts a string shorthand (e.g. "uzh-tzv2p") or a per-atom dict:
  #   {"H": ["TZV2P-MOLOPT-PBE-GTH-q1", "GTH-PBE-q1"],
  #    "C": ["TZV2P-MOLOPT-PBE-GTH-q4", "GTH-PBE-q4"], ...}
  # General value applies to unit_cell_opt and all postprocessing tasks.
  # find_scf_parameters uses its own cheap DZVP override (see below).
  numerical_p.basis_sets:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: true
    tasks: [unit_cell_opt, band_structure, eigenvalues, pdos, partial_charges]
  # Cheap DZVP-level basis for the SCF parameter search.
  # Use DZVP strings ("uzh-dzvp") or a per-atom DZVP dict.
  numerical_p.basis_sets->find_scf_parameters:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    optional: false
    compare: false
  # Per-atom DZVP dict (or string) for preopt — overrides the general value.
  numerical_p.basis_sets->unit_cell_preopt:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: false
  # ── Pseudo / basis files ───────────────────────────────────────────────────
  numerical_p.pseudo_file:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    optional: true
    compare: false
    tasks: [find_scf_parameters, unit_cell_opt, band_structure, eigenvalues, pdos, partial_charges]
  numerical_p.basis_file:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    optional: true
    compare: false
    tasks: [find_scf_parameters, unit_cell_opt, band_structure, eigenvalues, pdos, partial_charges]
  numerical_p.pseudo_file->unit_cell_preopt:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    optional: true
    compare: false
  numerical_p.basis_file->unit_cell_preopt:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    optional: true
    compare: false
  # ── Restart folders ───────────────────────────────────────────────────────
  # Pass a RemoteData node from a previous CellOptWorkChain or Cp2kCalculation
  # to restart the wavefunction / ionic positions.
  #
  # Example:
  #   wf.set_user_input("cp2k.parent_calc_folder->unit_cell_preopt",
  #                     load_node(pk=<remote_pk>))
  #   wf.set_user_input("cp2k.parent_calc_folder->unit_cell_opt",
  #                     load_node(pk=<remote_pk>))
  cp2k.parent_calc_folder->unit_cell_preopt:
    validation: aim2dat.cp2k.cell_opt
    aiida_node: true
    optional: true
    compare: false
  cp2k.parent_calc_folder->unit_cell_opt:
    validation: aim2dat.cp2k.cell_opt
    aiida_node: true
    optional: true
    compare: false
  # ── SCF-parameter override (resume with different MAX_SCF/mixing) ─────────
  # structural_p.scf_parameters is normally wired from find_scf_parameters' /
  # unit_cell_preopt's `scf_parameters` output (see the `dependencies` mapping
  # in `tasks:` above). individual_input takes priority over that dependency
  # wiring (workflow_builder.py _check_process_inputs, "individual_input takes
  # priority" comment), so setting this manually overrides the searched value
  # for just one task. compare: false, mirroring parent_calc_folder->unit_cell_opt
  # above, so it's excluded from determine_workflow_state's completed-task
  # comparison and can't make an already-finished task look "changed."
  # To resume an aborted SCF with a higher MAX_SCF instead of restarting from
  # an atomic guess:
  #   wf.set_user_input("cp2k.parent_calc_folder->unit_cell_opt",
  #                     load_node(pk=<remote_pk_of_aborted_calc>))  # -> SCF_GUESS RESTART
  #   wf.set_user_input("structural_p.scf_parameters->unit_cell_opt", {
  #       "MAX_SCF": 150,
  #       "MIXING": {"METHOD": "BROYDEN_MIXING", "BETA": 0.5, "ALPHA": 0.5, "NBUFFER": 10},
  #   })
  # No factor_extended_system scaling is reapplied here (that only runs inside
  # find_scf_parameters' search) — MAX_SCF is taken literally.
  structural_p.scf_parameters->unit_cell_opt:
    validation: aim2dat.cp2k.cell_opt
    aiida_node: true
    optional: true
    compare: false
  # ── Convergence / preopt failure handling ──────────────────────────────────
  ignore_convergence_failure:
    validation: aim2dat.cp2k.cell_opt
    aiida_node: true
    optional: true
    compare: false
    tasks: [unit_cell_preopt]
  # ── Compute codes & scheduler metadata ────────────────────────────────────
  cp2k.code:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: false
    tasks: [find_scf_parameters, unit_cell_preopt, unit_cell_opt, band_structure, eigenvalues, pdos, partial_charges]
  cp2k.metadata:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: false
    unstored: true
    optional: true
    compare: false
    tasks: [find_scf_parameters, unit_cell_preopt, unit_cell_opt, band_structure, eigenvalues, pdos, partial_charges]
  critic2.code:
    validation: aim2dat.cp2k.partial_charges
    aiida_node: true
    optional: true
    compare: false
    tasks: [partial_charges]
  critic2.metadata:
    validation: aim2dat.cp2k.partial_charges
    aiida_node: false
    unstored: true
    optional: true
    compare: false
    tasks: [partial_charges]
  chargemol.code:
    validation: aim2dat.cp2k.partial_charges
    aiida_node: true
    optional: true
    compare: false
    tasks: [partial_charges]
  chargemol.metadata:
    validation: aim2dat.cp2k.partial_charges
    aiida_node: false
    unstored: true
    optional: true
    compare: false
    tasks: [partial_charges]
  chargemol.path_atomic_densities:
    validation: aim2dat.cp2k.partial_charges
    aiida_node: true
    dependency: chargemol.code
    compare: false
    tasks: [partial_charges]
  clean_workdir:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    optional: true
    compare: false
    tasks: [find_scf_parameters, unit_cell_preopt, unit_cell_opt, band_structure, eigenvalues, pdos, partial_charges]
results:
  scf_method_level:
    task: find_scf_parameters
    output_port: scf_parameters
    retrieve_value: [method_level]
  scf_parameter_level:
    task: find_scf_parameters
    output_port: scf_parameters
    retrieve_value: [parameter_level]
  scf_smearing_level:
    task: find_scf_parameters
    output_port: scf_parameters
    retrieve_value: [smearing_level]
  optimized_structure:
    task: unit_cell_opt
    output_port: cp2k.output_structure
  total_energy:
    task: unit_cell_opt
    output_port: cp2k.output_parameters
    retrieve_value: [energy]
    unit: Hartree
  space_group:
    task: unit_cell_opt
    output_port: cp2k.output_parameters
    retrieve_value: [spgr_info, sg_number]
  band_structure:
    task: band_structure
    output_port: cp2k.output_bands
  pdos:
    task: pdos
    output_port: cp2k.output_pdos
  bader_populations:
    task: partial_charges
    output_port: critic2.output_bader_populations
  ddec6_populations:
    task: partial_charges
    output_port: chargemol.output_ddec6_populations
  hirshfeld_populations:
    task: partial_charges
    output_port: cp2k.output_hirshfeld_populations
  mulliken_populations:
    task: partial_charges
    output_port: cp2k.output_mulliken_populations
