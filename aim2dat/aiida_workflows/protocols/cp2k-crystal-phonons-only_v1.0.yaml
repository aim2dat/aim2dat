%YAML 1.2
---
title: cp2k-crystal-phonons-only
version: '1.0'
description: >
  Post-optimization, phonons-only pipeline for crystalline semiconductors/
  insulators. Takes an already-optimized StructureData as parent_node (e.g.
  the optimized_structure result of cp2k-crystal-opt_v1.0):
  (1) seekpath_analysis   — reduce to the primitive cell + compute the
                            q-point band path, once, on the optimized cell;
  (2) find_scf_parameters — fresh SCF convergence search on the primitive
                            cell (SCF parameters from an upstream cell-opt
                            don't transfer -- different structure/basis);
  (3) phonons             — finite-displacement phonon band structure + DOS.
  Split out from cp2k-crystal-phonons_v1.0 on 2026-07-06 alongside
  cp2k-crystal-opt_v1.0 (see that protocol's description, and the
  cp2k-crystal-phonons-v1.0 wiki gotcha, for why cell-opt and phonons are
  now two separate workflows rather than one four-task chain): running
  KEEP_SPACE_GROUP cell-opt directly on SeekPath's non-orthogonal primitive
  cell made spglib's own symmetry re-detection fragile. Reducing to the
  primitive cell exactly once, *after* optimization on the conventional
  cell, avoids that fragility -- and doing the reduction in a single
  seekpath_analysis task (rather than a separate, independent detection
  call) guarantees the structure and the q-point path are always mutually
  consistent (same call produces both, no risk of a second symmetry
  detection picking a different origin/setting).
dependencies:
- [aiida-core, '1.6', Null]
- [seekpath, '2.0', Null]
parent_node_type: structure
parent_node_input:
  seekpath_analysis: structure
tasks:
  seekpath_analysis:
    process: aim2dat.seekpath.structure_analysis
  find_scf_parameters:
    process: aim2dat.cp2k.find_scf_p
    blacklist_inputs:
    - custom_scf_method
    dependencies:
      seekpath_analysis:
      - [primitive_structure, structural_p.structure]
  phonons:
    process: aim2dat.cp2k.phonons
    dependencies:
      seekpath_analysis:
      - [primitive_structure, phonopy_p.structure]
      - [parameters, phonopy_p.path_parameters]
      find_scf_parameters:
      - [scf_parameters, force.structural_p.scf_parameters]

general_input:
  # ── CP2K parameters for the fresh find_scf_parameters search ──────────────
  cp2k.parameters:
    value:
      GLOBAL:
        PRINT_LEVEL: MEDIUM
        PREFERRED_DIAG_LIBRARY: SCALAPACK
        EXTENDED_FFT_LENGTHS: true
      FORCE_EVAL:
        METHOD: Quickstep
        STRESS_TENSOR: ANALYTICAL
        DFT:
          MGRID: {}
          POISSON: {PERIODIC: XYZ, POISSON_SOLVER: PERIODIC}
          BASIS_SET_FILE_NAME: [BASIS_MOLOPT_UZH, BASIS_MOLOPT, BASIS_MOLOPT_UCL]
          POTENTIAL_FILE_NAME: GTH_POTENTIALS
          QS: {EXTRAPOLATION: USE_GUESS, EPS_DEFAULT: 1.0e-14}
          SCF: {EPS_SCF: 5.0e-7}
          KPOINTS:
            EPS_GEO: 1.0e-8
            FULL_GRID: false
            SYMMETRY: false
          XC: {}
        SUBSYS:
          CELL: {PERIODIC: XYZ}
    aiida_node: true
    tasks: [find_scf_parameters]

  # CP2K parameters for the per-displacement force evaluations moved to
  # user_input (force.cp2k.parameters below) so EPS_SCF/MAX_SCF are tunable
  # from a notebook without editing this file.

  # ── k-point density (Å⁻¹) for find_scf_parameters ─────────────────────────
  numerical_p.kpoints_ref_dist:
    value: 0.15
    aiida_node: true
    tasks: [find_scf_parameters]

  # ── SCF solver settings ───────────────────────────────────────────────────
  scf_method:
    value: density_mixing
    aiida_node: true
    tasks: [find_scf_parameters]
  force.scf_method:
    value: density_mixing
    aiida_node: true
    tasks: [phonons]

  factor_unocc_states:
    value: 0.75
    aiida_node: true
    tasks: [find_scf_parameters]
  force.factor_unocc_states:
    value: 0.75
    aiida_node: true
    tasks: [phonons]

  enable_roks:
    value: false
    aiida_node: true
    tasks: [find_scf_parameters]
  force.enable_roks:
    value: false
    aiida_node: true
    tasks: [phonons]

  always_add_unocc_states:
    value: true
    aiida_node: true
    tasks: [find_scf_parameters]

  max_iterations:
    value: 100
    aiida_node: true
    compare: false
    tasks: [find_scf_parameters]
  force.max_iterations:
    value: 100
    aiida_node: true
    compare: false
    tasks: [phonons]


  # ── Phonopy defaults ──────────────────────────────────────────────────────
  phonopy_p.symprec:
    value: 0.005
    aiida_node: true
    tasks: [phonons]
  phonopy_p.dos_mesh:
    value: [20, 20, 20]
    aiida_node: true
    tasks: [phonons]

user_input:
  # ── SeekPath settings (primitive-cell reduction + band path) ──────────────
  # Port name must be exactly `parameters` -- it maps directly onto
  # seekpath_structure_analysis(structure, parameters)'s own second argument
  # (aiida_workflows/utils.py:113), not an aim2dat-chosen name (confirmed via
  # workflow_builder.py's _set_input_parameter: general_input/user_input keys
  # map 1:1 onto the process builder's actual ports, no aliasing). Kept as
  # user_input (overridable per-notebook, e.g. a tighter reference_distance)
  # rather than general_input, with a default matching the value used
  # manually in the pre-split v3 pipeline.
  parameters:
    validation: aim2dat.seekpath.structure_analysis
    aiida_node: true
    optional: true
    compare: false
    tasks: [seekpath_analysis]
    value: {reference_distance: 0.015, symprec: 0.005}

  # ── Extended-system flag (false for semiconductors / insulators) ──────────
  scf_extended_system:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: true
    tasks: [find_scf_parameters]
  force.scf_extended_system:
    validation: aim2dat.cp2k.phonons
    aiida_node: true
    compare: false
    tasks: [phonons]

  # CP2K parameters for per-displacement force evaluations.
  # Default: EPS_SCF=1e-8 / MAX_SCF=200 — tighter than the find_scf run
  # because SCF noise at 5e-7 caused imaginary modes at zone boundaries (X,
  # L) when force constants are reconstructed from a single displaced
  # supercell.
  force.cp2k.parameters:
    validation: aim2dat.cp2k.phonons
    aiida_node: true
    optional: true
    compare: false
    tasks: [phonons]
    value:
      GLOBAL:
        PRINT_LEVEL: MEDIUM
        PREFERRED_DIAG_LIBRARY: SCALAPACK
        EXTENDED_FFT_LENGTHS: true
      FORCE_EVAL:
        METHOD: Quickstep
        DFT:
          MGRID: {}
          POISSON: {PERIODIC: XYZ, POISSON_SOLVER: PERIODIC}
          BASIS_SET_FILE_NAME: [BASIS_MOLOPT_UZH, BASIS_MOLOPT, BASIS_MOLOPT_UCL]
          POTENTIAL_FILE_NAME: GTH_POTENTIALS
          QS: {EXTRAPOLATION: USE_GUESS, EPS_DEFAULT: 1.0e-14}
          SCF: {EPS_SCF: 1.0e-8, MAX_SCF: 200}
          XC: {}
        SUBSYS:
          CELL: {PERIODIC: XYZ}

  # ── XC functional ─────────────────────────────────────────────────────────
  numerical_p.xc_functional:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: true
    tasks: [find_scf_parameters]
  force.numerical_p.xc_functional:
    validation: aim2dat.cp2k.phonons
    aiida_node: true
    compare: false
    tasks: [phonons]

  # ── Basis sets ────────────────────────────────────────────────────────────
  numerical_p.basis_sets:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: true
    tasks: [find_scf_parameters]
  force.numerical_p.basis_sets:
    validation: aim2dat.cp2k.phonons
    aiida_node: true
    compare: false
    tasks: [phonons]

  # ── Grid cutoffs ──────────────────────────────────────────────────────────
  numerical_p.cutoff_values:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: true
    tasks: [find_scf_parameters]
  force.numerical_p.cutoff_values:
    validation: aim2dat.cp2k.phonons
    aiida_node: true
    compare: false
    tasks: [phonons]

  # ── Compute code & scheduler metadata ─────────────────────────────────────
  cp2k.code:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: false
    tasks: [find_scf_parameters]
  cp2k.metadata:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: false
    unstored: true
    optional: true
    compare: false
    tasks: [find_scf_parameters]
  force.cp2k.code:
    validation: aim2dat.cp2k.phonons
    aiida_node: true
    compare: false
    tasks: [phonons]
  force.cp2k.metadata:
    validation: aim2dat.cp2k.phonons
    aiida_node: false
    unstored: true
    optional: true
    compare: false
    tasks: [phonons]

  # ── Displacement amplitude — overridable: semicore species on production
  # grids need larger displacements for clean force constants (see the NaCl
  # egg-box case, 2026-07-06) ───────────────────────────────────────────────
  phonopy_p.displacement:
    validation: aim2dat.cp2k.phonons
    aiida_node: true
    optional: true
    compare: false
    tasks: [phonons]
    value: 0.01

  # ── Thermal properties (free energy, Cv, entropy vs. T) ───────────────────
  phonopy_p.thermal_properties:
    validation: aim2dat.cp2k.phonons
    aiida_node: true
    optional: true
    compare: false
    tasks: [phonons]
    value: false

  phonopy_p.temp_range:
    validation: aim2dat.cp2k.phonons
    aiida_node: true
    optional: true
    compare: false
    tasks: [phonons]
    value: [0.0, 1000.0, 10.0]

  # ── Supercell matrix — must be set per structure ──────────────────────────
  phonopy_p.supercell_matrix:
    validation: aim2dat.cp2k.phonons
    aiida_node: true
    compare: false
    tasks: [phonons]

  # ── Optional: clean scratch directories after each step ───────────────────
  clean_workdir:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    optional: true
    compare: false
    tasks: [find_scf_parameters]
  force.clean_workdir:
    validation: aim2dat.cp2k.phonons
    aiida_node: true
    optional: true
    compare: false
    tasks: [phonons]

results:
  scf_method_level:
    task: find_scf_parameters
    output_port: scf_parameters
    retrieve_value: [method_level]
  scf_parameter_level:
    task: find_scf_parameters
    output_port: scf_parameters
    retrieve_value: [parameter_level]
  scf_smearing_level:
    task: find_scf_parameters
    output_port: scf_parameters
    retrieve_value: [smearing_level]
  phonon_bands:
    task: phonons
    output_port: phonon_bands
  phonon_dos:
    task: phonons
    output_port: phonon_dos
  thermal_properties:
    task: phonons
    output_port: thermal_properties
  ref_forces:
    task: phonons
    output_port: ref_forces
