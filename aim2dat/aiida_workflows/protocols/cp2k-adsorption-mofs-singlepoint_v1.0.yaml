%YAML 1.2
---
# Protocol for single-point DFT confirmation of adsorption-site candidates that already
# survived semi-empirical (xtb) screening. Deliberately does *not* relax geometry -- unlike
# cp2k-adsorption-mofs-standard_v1.0 (find_scf_parameters -> pre_geo_opt -> geo_opt ->
# unit_cell_opt), this replaces the whole relaxation chain with a single `force_eval`
# (aim2dat.cp2k.force_eval, RUN_TYPE ENERGY_FORCE) task, since the candidate geometry was
# already optimized at the semi-empirical level and this step is only meant to confirm/rank
# it at DFT accuracy, not re-relax it.
title: cp2k-adsorption-singlepoint
version: '1.0'
description: >
  Single-point DFT energy confirmation (no geometry relaxation) for gas-adsorption candidate
  structures pre-screened by a semi-empirical method.
dependencies:
- [aiida-core, '2.7', Null]
parent_node_type: core.structure
parent_node_input:
  find_scf_parameters: structural_p.structure
  force_eval: structural_p.structure
  interaction_energy: structural_p.structure
tasks:
  find_scf_parameters:
    process: aim2dat.cp2k.find_scf_p
    blacklist_inputs:
    - custom_scf_method
  force_eval:
    process: aim2dat.cp2k.force_eval
    blacklist_inputs:
    - custom_scf_method
    dependencies:
      find_scf_parameters:
      - [scf_parameters, structural_p.scf_parameters]
  interaction_energy:
    process: aim2dat.cp2k.interaction_energy
    blacklist_inputs:
    - custom_scf_method
    dependencies:
      force_eval:
      - [scf_parameters, structural_p.scf_parameters]
      - [cp2k.output_structure, structural_p.structure]
  partial_charges:
    process: aim2dat.cp2k.partial_charges
    blacklist_inputs:
    - custom_scf_method
    dependencies:
      force_eval:
      - [scf_parameters, structural_p.scf_parameters]
      - [cp2k.output_structure, structural_p.structure]
      - [cp2k.remote_folder, cp2k.parent_calc_folder]
general_input:
  cp2k.parameters:
    value:
      GLOBAL:
        PRINT_LEVEL: MEDIUM
        PREFERRED_DIAG_LIBRARY: SCALAPACK
        EXTENDED_FFT_LENGTHS: true
      FORCE_EVAL:
        METHOD: Quickstep
        STRESS_TENSOR: ANALYTICAL
        DFT:
          MGRID: {}
          POISSON: {PERIODIC: XYZ, POISSON_SOLVER: PERIODIC}
          BASIS_SET_FILE_NAME: BASIS_MOLOPT_UZH
          POTENTIAL_FILE_NAME: POTENTIALS_UZH
          QS: {EXTRAPOLATION: USE_GUESS, EPS_DEFAULT: 1e-14}
          SCF: {EPS_SCF: 5.0e-7}
          KPOINTS:
            EPS_GEO: 1.0E-8
          XC: {}
        SUBSYS:
          CELL: {PERIODIC: XYZ}
    aiida_node: true
    tasks: [find_scf_parameters, force_eval, interaction_energy, partial_charges]
  numerical_p.kpoints_ref_dist:
    value: 0.15
    aiida_node: true
    tasks: [find_scf_parameters, force_eval, interaction_energy, partial_charges]
  enable_roks:
    value: false
    aiida_node: true
    tasks: [find_scf_parameters, force_eval, interaction_energy, partial_charges]
  scf_method:
    value: density_mixing
    aiida_node: true
    tasks: [find_scf_parameters, force_eval, interaction_energy, partial_charges]
  adjust_scf_parameters:
    value: true
    aiida_node: true
    tasks: [force_eval, interaction_energy, partial_charges]
  always_add_unocc_states:
    value: true
    aiida_node: true
    tasks: [find_scf_parameters, force_eval, partial_charges]
  factor_unocc_states:
    value: 0.75
    aiida_node: true
    tasks: [find_scf_parameters, force_eval, interaction_energy, partial_charges]
  max_iterations:
    value: 100
    aiida_node: true
    compare: False
    tasks: [find_scf_parameters, force_eval, interaction_energy, partial_charges]
  disable_cholesky->interaction_energy:
    value: true
    aiida_node: true
  critic2.parameters->partial_charges:
    value:
    - crystal aiida-ELECTRON_DENSITY-1_0.cube
    - load aiida-ELECTRON_DENSITY-1_0.cube zpsp
    - load aiida-ELECTRON_DENSITY-1_0.cube
    - integrable 2
    - yt
    dependency: critic2.code
    aiida_node: true
  chargemol.parameters->partial_charges:
    value: {'periodicity along A, B, and C vectors': [true, true, true], charge type: DDEC6}
    dependency: chargemol.code
    aiida_node: true
user_input:
  scf_extended_system:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: true
    tasks: [find_scf_parameters, force_eval, interaction_energy, partial_charges]
  numerical_p.xc_functional:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: true
    tasks: [find_scf_parameters, force_eval, interaction_energy, partial_charges]
  numerical_p.cutoff_values:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: true
    tasks: [find_scf_parameters, force_eval, partial_charges]
  numerical_p.basis_sets:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: true
    tasks: [find_scf_parameters, force_eval, interaction_energy, partial_charges]
  numerical_p.pseudo_file:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    optional: true
    compare: false
    tasks: [find_scf_parameters, force_eval, interaction_energy, partial_charges]
  numerical_p.basis_file:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    optional: true
    compare: false
    tasks: [find_scf_parameters, force_eval, interaction_energy, partial_charges]
  numerical_p.cutoff_values->interaction_energy:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: false
  fragments->interaction_energy:
    validation: aim2dat.cp2k.interaction_energy
    aiida_node: true
    compare: false
  cp2k.code:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    compare: false
    tasks: [find_scf_parameters, force_eval, interaction_energy, partial_charges]
  cp2k.metadata:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: false
    unstored: true
    optional: true
    compare: false
    tasks: [find_scf_parameters, force_eval, interaction_energy, partial_charges]
  critic2.code:
    validation: aim2dat.cp2k.partial_charges
    aiida_node: true
    optional: true
    compare: false
    tasks: [partial_charges]
  critic2.metadata:
    validation: aim2dat.cp2k.partial_charges
    aiida_node: false
    unstored: true
    optional: true
    compare: false
    tasks: [partial_charges]
  chargemol.code:
    validation: aim2dat.cp2k.partial_charges
    aiida_node: true
    optional: true
    compare: false
    tasks: [partial_charges]
  chargemol.metadata:
    validation: aim2dat.cp2k.partial_charges
    aiida_node: false
    unstored: true
    optional: true
    compare: false
    tasks: [partial_charges]
  chargemol.path_atomic_densities:
    validation: aim2dat.cp2k.partial_charges
    aiida_node: true
    dependency: chargemol.code
    compare: false
    tasks: [partial_charges]
  clean_workdir:
    validation: aim2dat.cp2k.find_scf_p
    aiida_node: true
    optional: true
    compare: false
    tasks: [find_scf_parameters, force_eval, interaction_energy, partial_charges]
results:
  scf_method_level:
    task: find_scf_parameters
    output_port: scf_parameters
    retrieve_value: [method_level]
  scf_parameter_level:
    task: find_scf_parameters
    output_port: scf_parameters
    retrieve_value: [parameter_level]
  scf_smearing_level:
    task: find_scf_parameters
    output_port: scf_parameters
    retrieve_value: [smearing_level]
  confirmed_structure:
    task: force_eval
    output_port: cp2k.output_structure
  total_energy:
    task: force_eval
    output_port: cp2k.output_parameters
    retrieve_value: [energy]
    unit: Hartree
  interaction_energy:
    task: interaction_energy
    output_port: cp2k.output_parameters
    retrieve_value: [interaction_energy]
    unit: Hartree
  bader_populations:
    task: partial_charges
    output_port: critic2.output_bader_populations
  ddec6_populations:
    task: partial_charges
    output_port: chargemol.output_ddec6_populations
  hirshfeld_populations:
    task: partial_charges
    output_port: cp2k.output_hirshfeld_populations
  mulliken_populations:
    task: partial_charges
    output_port: cp2k.output_mulliken_populations
