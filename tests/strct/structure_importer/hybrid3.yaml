      synthesis:
      - {id: 2179, created: '2026-03-28T19:23:13.157281-04:00', updated: '2026-03-28T20:11:51.862229-04:00',
        starting_materials: '4-fluorophenethylamine, methylammonium iodide, SnCl2·2H2O,
          HI, H3PO2', product: large black single crystals with plate morphology.
          Exfoliated crystals (micrometer-sized) were used for the PL measurements.,
        description: "Description: Slow-cooling method in hydroiodic acid. Precursors:\r
          \n- 4-fluorophenethylamine (4FPEA; TCI, >98%), 0.75 mmol\r\n- methylammonium
          iodide (Sigma Aldrich), 1.5 mmol\r\n- Tin(II) chloride dihydrate (Sigma
          Aldrich, 98% ACS reagent), 1.0 mmol\r\n- hydroiodic acid ≥47.0% with ≤1.5%
          hypophosphorous acid stabilizer (Sigma Aldrich), 2.0 mmol\r\n- hypophosphorous
          acid 50% (Sigma Aldrich), 2.0 mmol\r\nTin chloride and A-site cation salts
          were added an appropriate amount of 1:1 v/v HI and H3PO2 solution. Liquid
          4FPEA was added dropwise to this solution prior to heating. Solution was
          heated to full dissolution at 120 °C. The solution was then slow cooled
          to room temperature to yield large black crystals.", created_by: 1312, updated_by: 1312,
        dataset: 2820, system: 1}
      experimental:
      - {id: 2178, created: '2026-03-28T19:23:13.157822-04:00', updated: '2026-03-28T19:23:13.157703-04:00',
        method: Photoluminescence (lasing), description: "Lasing measurements were
          performed using a femtosecond laser\r\n(1030 nm, pulse width ≈ 300 fs, Pharos,
          Light Conversion) with an external harmonic generator\r\n(Hiro, Light Conversion)
          to generate a second harmonic 515 nm pump. The laser beam was then\r\ncollimated
          into a fiber collimator and sent to a Nikon LV100ND upright microscope,
          focused by a\r\n100x objective onto the exfoliated microflakes of 2D tin
          perovskites that were placed in a cryostat\r\n(THMS60, Linkam) and cooled
          down to 77 K. An Ocean Optics Maya2000 Pro spectrometer\r\ncollected the
          PL signals.", created_by: 1312, updated_by: 1312, dataset: 2820, system: 1}
